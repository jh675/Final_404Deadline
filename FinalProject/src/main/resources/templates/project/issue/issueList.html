<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/userLayout}">
<head>
<meta charset="UTF-8">
<title>이슈 목록</title>
<th:block layout:fragment="head-content">
  <!--
    TOAST UI Grid 페이징은 tui-pagination 에 의존합니다.
    CDN 사용 시 반드시 tui-pagination(.js) 을 tui-grid.js 보다 먼저 로드해야
    하단 페이지 네비게이션이 생성됩니다. (공식 pagination.md 참고)
  -->
  <link rel="stylesheet" href="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/grid/latest/tui-grid.css" />
  <script src="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.js"></script>
  <script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>

<style>
.issue-shell,
.issue-shell *,
.issue-shell *::before,
.issue-shell *::after {
	box-sizing: border-box;
}

.issue-shell {
	font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
	color: #333;
}

.issue-shell .issue-inner {
	max-width: 1100px;
	margin: 0 auto;
	background: #fff;
	border: 1px solid #ddd;
	border-radius: 8px;
	padding: 30px;
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
}

/* 검색 영역 */
.search-area {
	display: flex;
	flex-wrap: nowrap;
	align-items: center;
	gap: 12px;
	padding-bottom: 20px;
	border-bottom: 1px solid #eee;
	margin-bottom: 20px;
	overflow-x: auto;
}

.search-item {
	display: flex;
	align-items: center;
	gap: 6px;
	flex-shrink: 0;
}

.search-item label {
	font-weight: 600;
	font-size: 13px;
	color: #555;
	white-space: nowrap;
}

.search-item select, .search-item input[type="text"] {
	height: 32px;
	padding: 0 8px;
	border: 1px solid #ccc;
	border-radius: 4px;
	font-size: 13px;
	background-color: #fff;
	min-width: 90px;
}

.search-item input[type="text"] {
	min-width: 160px;
}

.checkbox-item {
	display: flex;
	align-items: center;
	gap: 4px;
	font-size: 13px;
	white-space: nowrap;
	flex-shrink: 0;
}

.search-btn {
	height: 32px;
	padding: 0 16px;
	background-color: #5b6cff;
	color: #fff;
	border: none;
	border-radius: 4px;
	font-size: 13px;
	cursor: pointer;
	font-weight: 600;
	white-space: nowrap;
	flex-shrink: 0;
}

.search-btn:hover {
	background-color: #4956d8;
}

.right-area {
	margin-left: auto;
	display: flex;
	align-items: center;
	gap: 10px;
	flex-shrink: 0;
}

/* 테이블 영역 */
table {
	width: 100%;
	border-collapse: collapse;
	font-size: 14px;
}

thead th {
	background-color: #f0f1f5;
	border: 1px solid #d8d8d8;
	padding: 10px 8px;
	text-align: center;
	font-weight: 600;
	color: #444;
}

thead th .sort {
	font-size: 11px;
	color: #888;
	margin-left: 3px;
}

tbody td {
	border: 1px solid #e0e0e0;
	padding: 10px 8px;
	text-align: center;
	color: #555;
}

tbody tr:hover {
	background-color: #fafbff;
	cursor: pointer;
}

td.title {
	text-align: left;
	padding-left: 14px;
}

/* 페이징 영역 */
.pagination {
	display: flex;
	justify-content: center;
	align-items: center;
	gap: 6px;
	margin-top: 24px;
}

.pagination a {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	min-width: 32px;
	height: 32px;
	padding: 0 8px;
	border: 1px solid #ccc;
	background-color: #fff;
	color: #555;
	text-decoration: none;
	border-radius: 4px;
	font-size: 13px;
}

.pagination a.active {
	background-color: #555;
	color: #fff;
	border-color: #555;
	font-weight: 600;
}

	.pagination a:hover:not(.active) {
		background-color: #f0f0f0;
	}

	/* 섹션 타이틀 (비교용) */
	.section-title {
		margin: 28px 0 12px;
		font-size: 15px;
		font-weight: 700;
		color: #5b6cff;
		border-left: 4px solid #5b6cff;
		padding-left: 10px;
	}

	/* TOAST UI Grid 컨테이너 */
	#grid {
		margin-top: 8px;
	}

	.issue-register-actions {
		margin-top: 18px;
		text-align: right;
	}

	.issue-register-btn {
		display: inline-block;
		padding: 10px 22px;
		background-color: #5b6cff;
		color: #fff;
		border: none;
		border-radius: 4px;
		font-size: 14px;
		font-weight: 600;
		text-decoration: none;
		cursor: pointer;
	}

	.issue-register-btn:hover {
		background-color: #4956d8;
		color: #fff;
	}
</style>
</th:block>
</head>
<body>
<div layout:fragment="content">
	<div class="issue-shell">
	<div class="issue-inner">
		<!-- 1. 검색 영역 (form 으로 감싸서 GET submit) -->
		<form id="searchForm" th:action="@{/issue/list}" method="get"
			th:object="${filter}" class="search-area">
			<div class="search-item">
				<label for="categoryCd">유형</label> <select id="categoryCd"
					th:field="*{categoryCd}">
					<option value="">미선택</option>
					<option value="01ISSUECATE">버그</option>
					<option value="02ISSUECATE">기능</option>
					<option value="03ISSUECATE">작업</option>
					<option value="04ISSUECATE">개선</option>
				</select>
			</div>
			<div class="search-item">
				<label for="priorityCd">우선순위</label> <select id="priorityCd"
					th:field="*{priorityCd}">
					<option value="">미선택</option>
					<option value="01ISSUEPRI">최상</option>
					<option value="02ISSUEPRI">상</option>
					<option value="03ISSUEPRI">중</option>
					<option value="04ISSUEPRI">하</option>
				</select>
			</div>

			<div class="search-item">
				<label for="statusCd">상태</label> <select id="statusCd"
					th:field="*{statusCd}">
					<option value="">미선택</option>
					<option value="01ISSUESTAT">신규</option>
					<option value="02ISSUESTAT">진행중</option>
					<option value="03ISSUESTAT">검토</option>
					<option value="04ISSUESTAT">완료</option>
				</select>
			</div>

			<div class="search-item">
				<label for="memId">담당자</label> <select id="memId"
					th:field="*{memId}">
					<option value="">미선택</option>
					<option value="1">홍길동</option>
					<option value="2">김길동</option>
					<option value="3">김민수</option>
					<option value="4">배민수</option>
				</select>
			</div>

			<div class="right-area">
				<div class="search-item">
					<label for="subject">제목</label> <input type="text" id="subject"
						th:field="*{subject}" placeholder="텍스트를 입력해 주세요.">
				</div>

				<label class="checkbox-item"> <input type="checkbox"
					id="myIssue" name="myIssue" value="Y" > 내가 맡은 이슈
				</label>

				<button type="submit" class="search-btn">검색</button>
			</div>
		</form>






		<div id="grid"></div>
		<div class="issue-register-actions">
			<a th:href="@{/issue/register}" class="issue-register-btn">이슈 등록</a>
		</div>
	</div>
	</div>

	<!-- ====================================================
	     서버 데이터를 JS 로 주입 (Thymeleaf inline javascript)
	     - th:inline="javascript" : Thymeleaf 표현식을 JS 안에서 사용 가능하게 함
	     - /*[[${issueList}]]*/ [] : 서버에서 내려준 List<IssueVO>를
	       JS 배열(JSON)로 변환해서 issueData 변수에 담음
	     - /*<![CDATA[*/ ... /*]]>*/ : XML 파싱 오류 방지용 (HTML5 에선 권장 패턴)
	==================================================== -->
	<script th:inline="javascript">
		/*<![CDATA[*/
		const issueData = /*[[${issueList}]]*/ [];
		const LOGIN_MEM_ID = /*[[${(#authentication.principal instanceof T(com.example.demo.login.service.UserVO)) ? #strings.toString(#authentication.principal.id) : ''}]]*/ '';

		
		/*]]>*/
	</script>

	<script >
		document.addEventListener('DOMContentLoaded', function () {
			const myIssueCheckbox = document.getElementById('myIssue');
			const memIdSelect = document.getElementById('memId');
			const searchForm = document.getElementById('searchForm');
			


			function applyMyIssueState() {
				if (myIssueCheckbox.checked) {
					console.log(LOGIN_MEM_ID);
					memIdSelect.value = LOGIN_MEM_ID;
					memIdSelect.disabled = true;
				} else {
					memIdSelect.disabled = false;
				}
			}

			applyMyIssueState();
			myIssueCheckbox.addEventListener('change', applyMyIssueState);

			searchForm.addEventListener('submit', function () {
				if (memIdSelect.disabled) {
					memIdSelect.disabled = false;
				}
			});

			// ============================================================
			// TOAST UI Grid 초기화
			// 공식 문서: https://github.com/nhn/tui.grid
			// ============================================================

			/**
			 * 날짜 포맷 함수
			 * - 서버 Date 가 JSON 직렬화될 때 timestamp(Long) 또는 ISO 문자열로 내려옴
			 * - 두 경우 모두 new Date(value) 로 받을 수 있음
			 * - 결과 형태: "2026-05-13 14:00"
			 */
			function formatDate(value) {
				if (!value) return '';                              // null / undefined / 빈 값 처리
				const d = new Date(value);
				if (isNaN(d.getTime())) return value;               // 변환 실패 시 원본 반환
				const pad = (n) => String(n).padStart(2, '0');      // 1 → "01" 형태로 0 채움
				return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
					+ ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
			}

			/**
			 * 우선순위 컬럼 커스텀 정렬 (사전순 X → 업무 순서)
			 * - 화면에는 get_sub_code_name 결과(예: 최상, 상, 중, 하)가 올 수 있고,
			 *   원본 코드가 넘어오는 경우도 함께 처리
			 * - 오름차순: 최상 → 상 → 중 → 하 (긴급도 높은 순)
			 */
			function priorityRank(value) {
				if (value == null || value === '') return 999;
				const key = String(value).trim();
				const order = {
					최상: 1,
					상: 2,
					중: 3,
					하: 4,

				};
				// order에 직접 정의된 키인지(hasOwnProperty)만 순위를 부여한다.
				// → 예: 키가 "toString" 등 Object.prototype 이름과 겹치면 잘못된 순위가 되는 것을 방지.
				// 매핑에 없는 값은 999로 두어 오름차순 정렬 시 맨 뒤로 보낸다.
				return order.hasOwnProperty(key) ? order[key] : 999;
			}

			function priorityComparator(valueA, valueB) {
				return priorityRank(valueA) - priorityRank(valueB);
			}

			/**
			 * tui.Grid 인스턴스 생성
			 * - new tui.Grid({ ...옵션 }) 한 번 호출로 그리드가 그려짐
			 */
			const grid = new tui.Grid({
				// ── 기본 설정 ──────────────────────────────────────────
				el: document.getElementById('grid'), // 그리드를 그릴 DOM 요소 (필수)
				data: issueData,                     // 그리드에 표시할 데이터 배열 (위에서 주입한 issueData)

				// ── 레이아웃 / 스크롤 옵션 ────────────────────────────
				scrollX: false,        // 가로 스크롤바 숨김
				scrollY: false,        // 세로 스크롤바 숨김 (rowHeight × 행수 만큼 자동 확장)
				bodyHeight: 'auto',    // 본문 높이를 데이터 양에 맞춰 자동 조절
				rowHeight: 36,         // 한 행의 높이(px)
				minBodyHeight: 100,    // 데이터 0건일 때 최소 높이(px)

				// ── 컬럼 정의 (가장 핵심) ─────────────────────────────
				// 배열 순서대로 왼쪽부터 표시됨
				// header  : 헤더에 표시되는 한글 라벨
				// name    : data 객체의 어떤 key 와 매핑할지 (예: row.subject)
				// width   : 컬럼 너비(px) — 생략 시 자동 분배
				// align   : 셀 텍스트 정렬 ('left' | 'center' | 'right')
				// sortable: true 면 헤더 클릭으로 정렬 가능 (기본 false)
				// comparator: 정렬 시 사용할 비교 함수 (생략 시 문자/숫자 기본 규칙 = 사전순 등)
				// formatter: 셀 표시값을 가공하는 함수.
				//            ({ row, value, column }) 인자에서
				//              - value  : 해당 셀의 원본 값
				//              - row    : 해당 행 전체 객체 (다른 컬럼 값 접근 가능)
				//            return 문자열(또는 HTML)이 셀에 그대로 렌더링됨
				columns: [
					{
						header: '아이디',
						name: 'id',
						width: 100,
						align: 'center',
						sortable: true
					},
					{
						// 제목 컬럼: 클릭 시 상세 페이지로 이동하도록 <a> 태그를 직접 렌더링
						header: '이슈명',
						name: 'subject',
						sortable: true,
						formatter: ({ row, value }) => {
							const id = row.id;                              // 같은 행의 id 값 참조
							const text = value == null ? '' : value;
							return '<a href="/issue/detail?id=' + id + '">' + text + '</a>';
						}
					},
					{
						header: '담당자',
						name: 'memName',
						width: 100,
						align: 'center',
						sortable: true
					},
					{
						header: '상태',
						name: 'statusCd',
						width: 100,
						align: 'center',
						sortable: true
					},
					{
						header: '우선순위',
						name: 'priorityCd',
						width: 100,
						align: 'center',
						sortable: true,
						comparator: priorityComparator
					},
					{
						// 수정일: Date 값을 yyyy-MM-dd HH:mm 으로 가공
						header: '수정일',
						name: 'updatedOn',
						width: 160,
						align: 'center',
						sortable: true,
						formatter: ({ value }) => formatDate(value)
					},
					{
						// 진척도: 숫자 뒤에 % 자동 추가
						header: '진척도',
						name: 'doneRatio',
						width: 100,
						align: 'center',
						sortable: true,
						formatter: ({ value }) => (value == null ? '' : value + '%')
					}
				],

				// ═══════════════════════════════════════════════════════════
				// 페이지네이션 (그리드 하단의 페이지 번호 영역 = tui-pagination)
				// - 스크립트: head 에서 tui-pagination.js 를 tui-grid.js 보다 먼저 로드해야
				//   하단 네비게이션 바가 생성됨.
				// - 동작: useClient 가 true 이면 서버에서 내려준 issueData 전체를 메모리에 두고,
				//   그리드는 한 페이지(perPage 행)만 그림. 페이지 클릭 시 서버 재요청 없이
				//   클라이언트에서만 행을 바꿔 보여 줌.
				// - 서버 페이징: useClient 를 끄고 data 대신 dataSource + readData API 를 쓰는
				//   방식(예: tutorial-example10-data-source)은 이 화면에서는 사용하지 않음.
				// ═══════════════════════════════════════════════════════════
				pageOptions: {
					useClient: true,
					perPage: 2

					// ---- 아래는 pageOptions 에서 지원하지만 여기서는 쓰지 않는 옵션 예시 ----
					// page: 1,
					//   초기 활성 페이지 번호(1부터). 생략 시 1.
					// visiblePages: 10,
					//   페이지 번호 버튼을 한 번에 최대 몇 개까지 보일지 (Grid v4.14.0 이상).
					// position: 'bottom',
					//   페이징 바 위치. 'bottom'(기본값) | 'top'(그리드 상단).
				}
			});

			// 참고 (위 pageOptions 와는 별개): 서버 페이징(DataSource)이면 readData 응답의
			// pagination.totalCount 등과 연동하고, resetData 시 pageState 로 페이지를 맞추는
			// 패턴이 있다. 이 목록은 클라이언트 페이징(useClient: true)만 사용한다.

			// ---- 페이징 관련 Grid API / 이벤트 (현재 코드에서는 호출하지 않음, 필요 시 사용) ----
			// const pagination = grid.getPagination(); // 내부 tui-pagination 인스턴스, 없으면 null
			// pagination?.getCurrentPage();
			// pagination?.movePageTo(2);
			// grid.setPerPage(20); // 페이지당 행 수만 변경
			// grid.setTotalCount(100); // 서버 페이징 등 전체 건수 동기화 시 (클라이언트 페이징만 쓸 때는 보통 불필요)
			// grid.on('beforePageMove', (ev) => { /* 페이지 이동 직전 */ });
			// grid.on('afterPageMove', (ev) => { /* 페이지 이동 직후 */ });

			/**
			 * 행 클릭 이벤트
			 * - grid.on('click', callback) : 그리드 내부에서 클릭이 발생했을 때 호출
			 * - ev 객체에는 rowKey(행 인덱스), columnName(컬럼 이름) 등이 들어있음
			 * - 제목(subject) 컬럼은 자체 <a> 링크가 있으니 중복 이동 방지
			 * - 그 외 셀을 클릭하면 해당 행의 상세 페이지로 이동
			 */
			grid.on('click', (ev) => {
				if (ev.columnName === 'subject' || ev.rowKey == null) return;
				const row = grid.getRow(ev.rowKey); // rowKey 로 해당 행 데이터 객체 조회
				if (row && row.id) {
					location.href = '/issue/detail?id=' + row.id;
				}
			});
		});
	</script>

</div>
</body>
</html>
