<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/userLayout}">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캘린더</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div layout:fragment="content">

		<div class="calendar-wrapper">
			<!-- 일정 표시버튼 (월간, 주간, 일간) -->
			<div class="toolbar">
				<div class="view-btn-group">
					<button class="view-btn" onclick="changeView('month')">월간</button>
					<button class="view-btn" onclick="changeView('week')">주간</button>
					<button class="view-btn active" onclick="changeView('day')">일간</button>
				</div>
				<!-- 달 (이전달, 다음달, 시스탬 기준 년/월) -->
				<button class="nav-btn" onclick="calendar.prev()">이전달</button>
				<div class="current-date" id="currentDate">년 월</div>
				<button class="nav-btn" onclick="calendar.next()">다음달</button>

				<!-- 검색 영역 -->
				<div class="search-area">
					<select class="filter-select" id="typeCd" onchange="filterEvents()">
						<option value="">전체</option>
						<option value="personal">개인일정</option>
						<option value="group">그룹일정</option>
						<option value="company">회사일정</option>
					</select> <input type="text" class="search-input" id="searchInput"
						placeholder="검색어를 입력해주세요." />
					<button class="search-btn" onclick="searchEvents()">검색</button>
				</div>
			</div>
			<!-- 캘린더 -->
			<div id="calendar" style="height:500px"></div>
		</div>



		<!-- ===== 일정 등록 모달 ===== -->

		
		<div class="modal fade" id="insertModalOverlay" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">일정 등록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
            <input id="test01"/>
						<div class="row mb-3">
							<div class="col">
								<label class="form-label">시작 날짜</label> <input type="date"
									id="ins_startDate" class="form-control bg-light" readonly>
								<div class="form-text">시작일은 선택한 날짜로 고정됩니다.</div>
							</div>

							<div class="col">
								<label class="form-label">종료 날짜</label> <input type="date"
									id="ins_endDate" class="form-control" min="">
							</div>
						</div>
						<div class="form-row">
					<label class="form-label">일정장소 <span></span></label> <input
						type="text" class="form-input" id="ins_place"
						placeholder="텍스트를 입력해 주세요." />
				</div>
						
						<div class="form-row">
					<label class="form-label">일정 내용</label> <input type="text"
						class="form-input" id="ins_calText" placeholder="텍스트를 입력해 주세요." />
				</div>
				<div class="form-row">
					<div class="checkbox-row">
						<label class="checkbox-label"> <input type="checkbox"
							id="ins_sharingAll" checked /> 전체 공유
						</label> <label class="checkbox-label"> <input type="checkbox"
							id="ins_sharingMe" /> 나만보기
						</label> <label class="form-label" style="margin: 0;">일정 유형</label> 
						<select name="sharingCd"
							class="form-select" id="ins_typeCd" style="width: auto;">
							<option value="">선택</option>
							<option value="01CALTYPE">개인일정</option>
							<option value="02CALTYPE">그룹일정</option>
							<option value="03CALTYPE">회사일정</option>
						</select>
					</div>
				</div>

				<!-- 일정 등록 모달창 -->
				<div class="form-row">
					<div class="time-row">
						<span class="time-label">시작시간</span> <select class="form-select"
							id="ins_calStart">
							<option value="">선택</option>
							<option value="09:00:00">오전 09:00</option>
							<option value="09:15:00">오전 09:15</option>
							<option value="09:30:00">오전 09:30</option>
							<option value="10:15:00">오전 10:15</option>
							<option value="10:30:00">오전 10:30</option>
							<option value="11:00:00">오전 11:00</option>
							<option value="12:00:00">오후 12:00</option>
							<option value="13:00:00">오후 01:00</option>
							<option value="14:00:00">오후 02:00</option>
							<option value="15:00:00">오후 03:00</option>
							<option value="16:00:00">오후 04:00</option>
							<option value="17:00:00">오후 05:00</option>
							<option value="18:00:00">오후 06:00</option>
						</select> <span class="time-label">종료시간</span> <select class="form-select"
							id="ins_calEnd">
							<option value="">선택</option>
							<option value="09:00:00">오전 09:00</option>
							<option value="09:15:00">오전 09:15</option>
							<option value="09:30:00">오전 09:30</option>
							<option value="10:15:00">오전 10:15</option>
							<option value="10:30:00">오전 10:30</option>
							<option value="11:00:00">오전 11:00</option>
							<option value="12:00:00">오후 12:00</option>
							<option value="13:00:00">오후 01:00</option>
							<option value="14:00:00">오후 02:00</option>
							<option value="15:00:00">오후 03:00</option>
							<option value="16:00:00">오후 04:00</option>
							<option value="17:00:00">오후 05:00</option>
							<option value="18:00:00">오후 06:00</option>
						</select>
					</div>
				</div>
            
            </div>
            
            <div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
					<button class="btn btn-primary" onclick="insertEvent()">확인</button>
			</div>
          </div>
		</div>
		
		</div>


		<div th:replace="~{project/calender/modal/calenderAdd}"></div>
    
	<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>
	<script>
    const Calendar = tui.Calendar;
	
    const calendar = new Calendar('#calendar', {
        defaultView: 'month',
        language: 'ko',
        usageStatistics: false,
        
        week: {
		  dayNames: ['일', '월', '화', '수', '목', '금', '토'],
        },
        month: {
		  dayNames: ['일', '월', '화', '수', '목', '금', '토'],
		  visibleEventCount: 3,
        },
        calendars: [
        	{ id: 'holiday', name: '공휴일', color: '#fff', backgroundColor: '#ff4d4d', borderColor: '#ff4d4d' },
            { id: 'personal', name: '개인일정', color: '#fff', backgroundColor: '#ff6b6b', borderColor: '#ff6b6b' },
            { id: 'group',    name: '그룹일정', color: '#fff', backgroundColor: '#51cf66', borderColor: '#51cf66' },
            { id: 'company',  name: '회사일정', color: '#fff', backgroundColor: '#339af0', borderColor: '#339af0' },
        ],
        template: {
            time(event) {
                return `<span>${event.title}</span>`;
            }
        }
    });

    // 날짜 표시 업데이트
    function updateDateLabel() {
        const date = calendar.getDate();
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        document.getElementById('currentDate').textContent = `${year}년 ${month}월`;
    }
    updateDateLabel();
    
 // 날짜/시간 클릭 시 모달 띄우기
    calendar.on('selectDateTime', (event) => {
        // 클릭한 날짜 정보 (필요시 사용)
        const start = event.start;
        console.log("선택된 날짜:", start.getYear());

        document.getElementById('ins_place').value = '';
        document.getElementById('ins_calText').value = '';
        document.getElementById('ins_typeCd').value = '';
        
        // 부트스트랩 모달 인스턴스 생성 및 표시
        openModal('insertModalOverlay');
    });
 
 
    // 뷰 전환
    function changeView(view) {
        calendar.changeView(view);
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        const map = { month: 0, week: 1, day: 2 };
        document.querySelectorAll('.view-btn')[map[view]].classList.add('active');
        updateDateLabel();
    }

    // 이전/다음 클릭 시 날짜 업데이트
    document.querySelector('.nav-btn').addEventListener('click', () => setTimeout(updateDateLabel, 0));

    // 서버에서 일정 불러오기
    function loadEvents(typeCd = '') {
        fetch(`/calender/list?typeCd=${typeCd}`, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.json())
            .then(data => {
                calendar.clear();
                const events = data.map(item => ({
                    id: String(item.id),
                    calendarId: item.typeCd || 'personal',
                    title: item.place,
                    start: item.calStart,
                    end: item.calEnd,
                    extendedProps: item
                }));
                calendar.createEvents(events);
            })
            .catch(() => {
                // 개발 중 샘플 데이터
                calendar.createEvents([
                    { id: '1', calendarId: 'company', title: '총무팀 회의 00관련', start: new Date(), end: new Date(Date.now() + 7200000) },
                    { id: '2', calendarId: 'personal', title: '어버이날 5', start: new Date(Date.now() - 86400000), end: new Date(Date.now() - 82800000) },
                ]);
            });
    }
    loadEvents();

    // 일정 유형 필터
    function filterEvents() {
        const typeCd = document.getElementById('typeCd').value;
        loadEvents(typeCd);
    }

    // 일정검색
    function searchEvents() {
        const keyword = document.getElementById('searchInput').value.trim();
        const typeCd = document.getElementById('typeCd').value;
        if (!keyword) { showAlert('검색어를 입력해 주세요.'); return; }
        fetch(`/calender/search?keyword=${keyword}&typeCd=${typeCd}`, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.json())
            .then(data => {
                if (!data || data.length === 0) { 
					showAlert('검색 결과가 없습니다.'); 
                    return; 
                }
                const item = data[0];
                document.getElementById('res_date').textContent = item.calStart?.split('T')[0] || '';
                document.getElementById('res_time').textContent = `${item.calStart} ~ ${item.calEnd}`;
                document.getElementById('res_place').textContent = item.place || '';
                document.getElementById('res_calText').textContent = item.calText || '';
                document.getElementById('res_typeCd').textContent = item.typeCd || '';
                document.getElementById('res_sharing').textContent = item.sharingCd || '';
                document.getElementById('res_state').textContent = item.stateCd || '';
                openModal('resultModalOverlay');
            });
    }


    // 일정 클릭 → 수정 모달
    /* calendar.on('clickEvent', ({ event }) => {
        const p = event.extendedProps || {};
        document.getElementById('upd_id').value = event.id;
        document.getElementById('upd_place').value = event.title || '';
        document.getElementById('upd_calText').value = p.calText || '';
        document.getElementById('upd_typeCd').value = p.typeCd || '';
        openModal('updateModalOverlay');
    }); */
    
    // 등록
    function insertEvent() {
        const place = document.getElementById('ins_place').value.trim();
        const calText = document.getElementById('ins_calText').value.trim();
        const typeCd = document.getElementById('ins_typeCd').value;
        const calStart = document.getElementById('ins_calStart').value;
        const calEnd = document.getElementById('ins_calEnd').value;

        if (!place || !typeCd || !calStart || !calEnd) {
            showAlert('필수값 모두 입력해 주세요');
            return;
        }

        fetch('/calender/insert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `place=${place}&calText=${calText}&typeCd=${typeCd}&calStart=${calStart}&calEnd=${calEnd}`
        })
        .then(res => res.text())
        .then(() => {
            closeModal('insertModalOverlay');
            showAlert('등록이 완료 되었습니다');
            loadEvents();
        });
    }

    // 일정수정
    function updateEvent() {
        const id = document.getElementById('upd_id').value;
        const place = document.getElementById('upd_place').value.trim();
        const calText = document.getElementById('upd_calText').value.trim();
        const typeCd = document.getElementById('upd_typeCd').value;
        const calStart = document.getElementById('upd_calStart').value;
        const calEnd = document.getElementById('upd_calEnd').value;

        fetch('/calender/update', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `id=${id}&place=${place}&calText=${calText}&typeCd=${typeCd}&calStart=${calStart}&calEnd=${calEnd}`
        })
        .then(res => res.text())
        .then(() => {
            closeModal('updateModalOverlay');
            showAlert('변경이 완료 되었습니다');
            loadEvents();
        });
    }

    // 삭제 확인
    function confirmDelete() {
        closeModal('updateModalOverlay');
        openModal('deleteConfirmOverlay');
    }

    // 삭제 실행
    function deleteEvent() {
        const id = document.getElementById('upd_id').value;
        fetch('/calender/delete', {
            method: 'delete',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `id=${id}`
        })
        .then(res => res.text())
        .then(() => {
            closeModal('deleteConfirmOverlay');
            showAlert('일정이 삭제 되었습니다');
            loadEvents();
        });
    }

    // 모달 열기/닫기
    function openModal(id) {
        new bootstrap.Modal(document.getElementById(id)).show();
    }
    
    function closeModal(id) {
    	// 1. 해당 ID를 가진 HTML 요소를 찾습니다.
        const modalElement = document.getElementById(modalId);
        
        // 2. 부트스트랩 모달 인스턴스를 가져옵니다.
        const modalInstance = bootstrap.Modal.getInstance(modalElement);
        
        // 3. 인스턴스가 존재하면 닫습니다.
        if (modalInstance) {
            modalInstance.hide();
        }
    }

    // 안내 메시지
    function showAlert(msg) {
        document.getElementById('alertMsg').textContent = msg;
        openModal('alertModalOverlay');
    }
     </script>
  </div>
</body>
</html>
