<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>공지사항 관리</title>
</head>
<body>
    <h2 th:text="${notice.id != null} ? '공지사항 수정' : '공지사항 등록'">공지사항 등록</h2>

    <form th:action="${notice.id != null} ? @{/notice/modify} : @{/notice/insert}" 
          method="post" 
          enctype="multipart/form-data">
        
        <input type="hidden" name="id" th:value="${notice.id}">
        <input type="hidden" name="prjId" th:value="${4}">
        <input type="hidden" name="memId" th:value="${1}">
        
        <table border="1">
            <tr>
                <th>상단고정</th>
                <td>

                    <input type="checkbox" name="isFixed" th:checked="${notice.isFixed == 'Y'}" value="Y"> 상단 고정 사용
                </td>
            </tr>
            <tr>
                <th>제목</th>
                <td>
                    <input type="text" name="title" th:value="${notice.title}" required>
                </td>
            </tr>
            
            <tr>
                <th>내용</th>
                <td>
                    <textarea name="description" rows="10" cols="50" th:text="${notice.description}"></textarea>
                </td>
            </tr>
            <tr>
                <th>첨부파일</th>
                <td>
                    <input type="file" name="file">
                </td>
            </tr>
        </table>

        <div style="margin-top: 10px;">
            <button type="submit" th:text="${notice.id != null} ? '수정완료' : '등록완료'">등록</button>
            

            <button type="button" th:if="${notice.id != null}" 
                    th:onclick="|if(confirm('정말 삭제하시겠습니까?')) location.href='@{/notice/delete(id=${notice.id})}'|">삭제</button>
            
            <button type="button" th:onclick="|location.href='@{/notice/list}'|">취소</button>
        </div>
    </form>
</body>
</html>
