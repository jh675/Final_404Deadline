<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/userLayout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>권한 관리</title>
    <link
      rel="stylesheet"
      href="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.css"
    />
    <link
      rel="stylesheet"
      href="https://uicdn.toast.com/grid/latest/tui-grid.css"
    />
    <script src="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.js"></script>
    <script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>

    <style>
      .role-search {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 1rem;
        padding: 1rem 1.25rem;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        background: #fafafa;
      }
      .role-search__bar {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0.75rem 1.25rem;
        flex: 1;
        min-width: 0;
        overflow-x: auto;
      }
      .role-search__inline {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: nowrap;
        flex-shrink: 0;
      }
      .role-search__inline label {
        font-size: 0.8125rem;
        color: #444;
        white-space: nowrap;
      }
      .role-search__inline input[type="text"],
      .role-search__inline input[type="date"] {
        min-width: 10rem;
        padding: 0.35rem 0.5rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .role-search__inline--date-range input[type="date"] {
        min-width: 9.5rem;
      }
      .role-search__tilde {
        color: #444;
        font-size: 0.875rem;
        user-select: none;
      }
      .role-search__actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-shrink: 0;
      }
      .role-search__actions button {
        padding: 0.4rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid #1976d2;
        background: #1976d2;
        color: #fff;
        font-size: 0.875rem;
      }
      .role-search__actions button[type="button"] {
        background: #fff;
        color: #333;
        border-color: #ccc;
      }

      .role-grid-toolbar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 2px 0.25rem;
        box-sizing: border-box;
      }
      .role-grid-toolbar__btn {
        padding: 0.35rem 0.95rem;
        border-radius: 4px;
        font-size: 0.875rem;
        cursor: pointer;
        line-height: 1.25;
      }
      .role-grid-toolbar__btn--register {
        border: 1px solid #1565c0;
        background: #1976d2;
        color: #fff;
      }
      .role-grid-toolbar__btn--register:hover {
        background: #1565c0;
      }
      .role-grid-toolbar__btn--delete {
        border: 1px solid #c62828;
        background: #fff;
        color: #c62828;
      }
      .role-grid-toolbar__btn--delete:hover {
        background: #ffebee;
      }
    </style>

    <script th:inline="javascript">
      /*<![CDATA[*/
      const prjId = /*[[${prjId}]]*/ "";
      const roleData = /*[[${rows}]]*/ [];
      /*]]>*/
    </script>
  </head>
  <body>
    <div layout:fragment="content">
      <form
        class="role-search"
        id="roleSearchForm"
        th:action="@{/project/option/role/roleManagement}"
        method="get"
      >
        <input type="hidden" name="prjId" th:value="${prjId}" />
        <div class="role-search__bar">
          <div class="role-search__inline">
            <label for="permissionKey">권한아이디</label>
            <input
              type="text"
              id="permissionKey"
              name="permissionKey"
              th:value="${permissionKey}"
              placeholder="권한아이디"
              autocomplete="off"
            />
          </div>
          <div class="role-search__inline">
            <label for="permissionName">권한명</label>
            <input
              type="text"
              id="permissionName"
              name="permissionName"
              th:value="${permissionName}"
              placeholder="권한명"
              autocomplete="off"
            />
          </div>
          <div class="role-search__inline role-search__inline--date-range">
            <label for="createdFrom">생성일</label>
            <input
              type="date"
              id="createdFrom"
              name="createdFrom"
              th:value="${createdFrom}"
            />
            <span class="role-search__tilde">~</span>
            <input
              type="date"
              id="createdTo"
              name="createdTo"
              th:value="${createdTo}"
              aria-label="생성일 종료"
            />
          </div>
          <div class="role-search__actions">
            <button type="submit">검색</button>
            <button type="button" id="roleSearchReset">초기화</button>
          </div>
        </div>
      </form>

      <div id="grid"></div>

      <script>
        document.addEventListener("DOMContentLoaded", function () {
          (function roleSearchDates() {
            const form = document.getElementById("roleSearchForm");
            const start = document.getElementById("createdFrom");
            const end = document.getElementById("createdTo");
            if (!form || !start || !end) return;

            const pad = (n) => String(n).padStart(2, "0");
            const todayStr = () => {
              const d = new Date();
              return (
                d.getFullYear() +
                "-" +
                pad(d.getMonth() + 1) +
                "-" +
                pad(d.getDate())
              );
            };

            const compare = (a, b) => {
              if (!a || !b) return 0;
              return a < b ? -1 : a > b ? 1 : 0;
            };

            function minYmd(a, b) {
              if (!a) return b;
              if (!b) return a;
              return compare(a, b) <= 0 ? a : b;
            }

            function applyLimits() {
              const today = todayStr();
              const sv = start.value;
              const ev = end.value;

              end.max = today;
              if (sv) {
                end.min = sv;
              } else {
                end.removeAttribute("min");
              }

              start.max = ev ? minYmd(today, ev) : today;
            }

            function clampStart() {
              const today = todayStr();
              let sv = start.value;
              let ev = end.value;
              if (sv && compare(sv, today) > 0) {
                sv = today;
                start.value = sv;
              }
              if (sv && ev && compare(sv, ev) > 0) {
                end.value = sv;
              }
              applyLimits();
            }

            function clampEnd() {
              const today = todayStr();
              let sv = start.value;
              let ev = end.value;
              if (ev && compare(ev, today) > 0) {
                end.value = today;
                ev = today;
              }
              if (sv && ev && compare(ev, sv) < 0) {
                start.value = ev;
              }
              applyLimits();
            }

            clampStart();
            clampEnd();
            applyLimits();

            start.addEventListener("change", clampStart);
            start.addEventListener("input", clampStart);
            end.addEventListener("change", clampEnd);
            end.addEventListener("input", clampEnd);

            form.addEventListener("submit", function (e) {
              clampStart();
              clampEnd();
              const today = todayStr();
              const sv = start.value;
              const ev = end.value;
              if (sv && compare(sv, today) > 0) {
                e.preventDefault();
                alert("시작일은 오늘 이후로 지정할 수 없습니다.");
                return;
              }
              if (ev && compare(ev, today) > 0) {
                e.preventDefault();
                alert("종료일은 오늘 이후로 지정할 수 없습니다.");
                return;
              }
              if (sv && ev && compare(sv, ev) > 0) {
                e.preventDefault();
                alert("시작일은 종료일보다 늦을 수 없습니다.");
                return;
              }
            });

            const resetBtn = document.getElementById("roleSearchReset");
            if (resetBtn) {
              resetBtn.addEventListener("click", function () {
                const pid = form.querySelector('input[name="prjId"]').value;
                const url = new URL(form.action, window.location.href);
                url.search = new URLSearchParams({ prjId: pid }).toString();
                window.location.href = url.toString();
              });
            }
          })();

          function formatDate(value) {
            if (!value) return "";
            const d = new Date(value);
            if (isNaN(d.getTime())) return value;
            const pad = (n) => String(n).padStart(2, "0");
            return (
              d.getFullYear() +
              "-" +
              pad(d.getMonth() + 1) +
              "-" +
              pad(d.getDate())
            );
          }

          const grid = new tui.Grid({
            el: document.getElementById("grid"),
            data: roleData,
            rowHeaders: ["rowNum"],
            scrollX: false,
            scrollY: false,
            bodyHeight: "auto",
            rowHeight: 36,
            minBodyHeight: 100,
            columns: [
              {
                header: "권한 아이디",
                name: "roleId",
                width: 250,
                align: "center",
                sortable: true,
              },
              {
                header: "권한명",
                name: "roleName",
                width: 200,
                align: "center",
                sortable: true,
                formatter: ({ row, value }) => {
                  const id = row.id;
                  const text = value == null ? "" : value;
                  const q =
                    "prjId=" +
                    encodeURIComponent(prjId) +
                    "&roleId=" +
                    encodeURIComponent(id == null ? "" : String(id));
                  return (
                    '<a href="/project/option/role/roleManagementInfo?' +
                    q +
                    '">' +
                    text +
                    "</a>"
                  );
                },
              },
              {
                header: "권한 보유 그룹 수",
                name: "grpCnt",
                width: 200,
                align: "center",
                sortable: true,
              },
              {
                header: "생성일",
                name: "createdOn",
                width: 100,
                align: "center",
                sortable: true,
                formatter: ({ value }) => formatDate(value),
              },
            ],
            pageOptions: {
              useClient: true,
              perPage: 15,
            },
          });

          setTimeout(function () {
            (function roleGridToolbar() {
              const host = document.getElementById("grid");
              if (!host || host.querySelector(".role-grid-toolbar")) return;
              const bar = document.createElement("div");
              bar.className = "role-grid-toolbar";
              bar.setAttribute("role", "toolbar");
              bar.innerHTML =
                '<button type="button" class="role-grid-toolbar__btn role-grid-toolbar__btn--register" id="roleBtnRegister">등록</button>' +
                '<button type="button" class="role-grid-toolbar__btn role-grid-toolbar__btn--delete" id="roleBtnDelete">삭제</button>';
              const pag = host.querySelector(".tui-pagination");
              if (pag && pag.parentNode) {
                pag.parentNode.insertBefore(bar, pag);
              } else {
                host.appendChild(bar);
              }
            })();
          }, 0);

          grid.on("click", (ev) => {
            if (ev.columnName === "roleName" || ev.rowKey == null) return;
            const row = grid.getRow(ev.rowKey);
            if (row && row.id != null && row.id !== "") {
              location.href =
                "/project/option/role/roleManagementInfo?prjId=" +
                encodeURIComponent(prjId) +
                "&roleId=" +
                encodeURIComponent(String(row.id));
            }
          });
        });
      </script>
    </div>
  </body>
</html>
