<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/userLayout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>프로젝트 역할 관리</title>
    <link
      rel="stylesheet"
      href="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.css"
    />
    <link
      rel="stylesheet"
      href="https://uicdn.toast.com/grid/latest/tui-grid.css"
    />
    <script src="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.js"></script>
    <script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>

    <style>
      .menu-role-page {
        max-width: 100%;
      }
      .menu-role-page__head {
        margin-bottom: 1.25rem;
      }
      .menu-role-page__title {
        margin: 0 0 0.35rem;
        font-size: 1.15rem;
        font-weight: 600;
        color: #222;
      }
      .menu-role-page__rule {
        height: 3px;
        background: #333;
        border: 0;
        margin: 0 0 0.75rem;
      }
      .menu-role-page__lead {
        margin: 0;
        font-size: 0.8125rem;
        line-height: 1.55;
        color: #555;
      }
      .menu-role-page__lead code {
        font-size: 0.8em;
        padding: 0.05em 0.35em;
        background: #f0f0f0;
        border-radius: 3px;
      }
      .menu-role-page__section-title {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        color: #222;
        padding-bottom: 0.35rem;
        border-bottom: 3px solid #333;
      }
      .menu-role-page__search {
        margin-bottom: 1.25rem;
      }
      .menu-role-page__list {
        margin-top: 0.5rem;
      }
      .menu-role-page__grid-wrap {
        margin-top: 0.25rem;
      }
      .menu-role-page__grid-host {
        min-height: 120px;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .role-search {
        display: flex;
        align-items: center;
        gap: 0;
        padding: 1rem 1.25rem;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        background: #fafafa;
      }
      .role-search__bar {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0.75rem 1.25rem;
        flex: 1;
        min-width: 0;
        overflow-x: auto;
      }
      .role-search__inline {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: nowrap;
        flex-shrink: 0;
      }
      .role-search__inline label {
        font-size: 0.8125rem;
        color: #444;
        white-space: nowrap;
      }
      .role-search__inline input[type="text"],
      .role-search__inline input[type="date"] {
        min-width: 10rem;
        padding: 0.35rem 0.5rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .role-search__inline--date-range input[type="date"] {
        min-width: 9.5rem;
      }
      .role-search__tilde {
        color: #444;
        font-size: 0.875rem;
        user-select: none;
      }
      .role-search__actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-shrink: 0;
      }
      .role-search__actions button {
        padding: 0.4rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid #1976d2;
        background: #1976d2;
        color: #fff;
        font-size: 0.875rem;
      }
      .role-search__actions button[type="button"] {
        background: #fff;
        color: #333;
        border-color: #ccc;
      }

      .role-grid-toolbar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 2px 0.25rem;
        box-sizing: border-box;
      }
      .role-grid-toolbar__btn {
        padding: 0.35rem 0.95rem;
        border-radius: 4px;
        font-size: 0.875rem;
        cursor: pointer;
        line-height: 1.25;
      }
      .role-grid-toolbar__btn--register {
        border: 1px solid #1565c0;
        background: #1976d2;
        color: #fff;
      }
      .role-grid-toolbar__btn--register:hover {
        background: #1565c0;
      }
      .role-grid-toolbar__btn--delete {
        border: 1px solid #c62828;
        background: #e53935;
        color: #fff;
      }
      .role-grid-toolbar__btn--delete:hover {
        background: #c62828;
      }
      .role-grid-toolbar__btn--remove {
        border: 1px solid #6a1b9a;
        background: #7b1fa2;
        color: #fff;
      }
      .role-grid-toolbar__btn--remove:hover {
        background: #6a1b9a;
      }
      .role-grid-toolbar__btn--cancel-delete {
        border: 1px solid #999;
        background: #fff;
        color: #333;
      }
      .role-grid-toolbar__btn--cancel-delete:hover {
        background: #f5f5f5;
      }
    </style>

    <script th:inline="javascript">
      /*<![CDATA[*/
      const prjId = /*[[${prjId}]]*/ "";
      /** 서버 `selectRoleList`: 기준 테이블은 ROLE(R), 그룹 수는 GRP_ROLE·GRP 조인 */
      const projectRoleRows = /*[[${rows}]]*/ [];
      /*]]>*/
    </script>
  </head>
  <body>
    <div layout:fragment="content">
      <main class="menu-role-page">
        <header class="menu-role-page__head">
          <h1 class="menu-role-page__title">프로젝트 역할 관리</h1>
          <hr class="menu-role-page__rule" />
        </header>

        <section
          class="menu-role-page__search"
          aria-labelledby="menu-role-search-heading"
        >
          <h2 id="menu-role-search-heading" class="visually-hidden">
            역할 검색
          </h2>
          <form
            class="role-search"
            id="roleSearchForm"
            th:action="@{/project/option/role/roleManagement}"
            method="get"
          >
            <input type="hidden" name="prjId" th:value="${prjId}" />
            <div class="role-search__bar">
              <div class="role-search__inline">
                <label for="permissionKey">역할 코드</label>
                <input
                  type="text"
                  id="permissionKey"
                  name="permissionKey"
                  th:value="${permissionKey}"
                  placeholder="역할 코드"
                  autocomplete="off"
                />
              </div>
              <div class="role-search__inline">
                <label for="permissionName">역할명</label>
                <input
                  type="text"
                  id="permissionName"
                  name="permissionName"
                  th:value="${permissionName}"
                  placeholder="역할명"
                  autocomplete="off"
                />
              </div>
              <div class="role-search__inline role-search__inline--date-range">
                <label for="createdFrom">역할 생성일</label>
                <input
                  type="date"
                  id="createdFrom"
                  name="createdFrom"
                  th:value="${createdFrom}"
                />
                <span class="role-search__tilde">~</span>
                <input
                  type="date"
                  id="createdTo"
                  name="createdTo"
                  th:value="${createdTo}"
                  aria-label="권한 생성일 종료"
                />
              </div>
              <div class="role-search__actions">
                <button type="submit">검색</button>
              </div>
            </div>
          </form>
        </section>

        <section
          class="menu-role-page__list"
          aria-labelledby="menu-role-list-heading"
        >
          <h2 class="menu-role-page__section-title" id="menu-role-list-heading">
            프로젝트 역할 목록
          </h2>
          <div class="menu-role-page__grid-wrap">
            <div
              id="menuRoleGrid"
              class="menu-role-page__grid-host"
              role="region"
              aria-label="프로젝트 역할 그리드"
            ></div>
          </div>
        </section>
      </main>

      <script>
        document.addEventListener("DOMContentLoaded", function () {
          (function roleSearchDates() {
            const form = document.getElementById("roleSearchForm");
            const start = document.getElementById("createdFrom");
            const end = document.getElementById("createdTo");
            if (!form || !start || !end) return;

            const pad = (n) => String(n).padStart(2, "0");
            const todayStr = () => {
              const d = new Date();
              return (
                d.getFullYear() +
                "-" +
                pad(d.getMonth() + 1) +
                "-" +
                pad(d.getDate())
              );
            };

            const compare = (a, b) => {
              if (!a || !b) return 0;
              return a < b ? -1 : a > b ? 1 : 0;
            };

            function minYmd(a, b) {
              if (!a) return b;
              if (!b) return a;
              return compare(a, b) <= 0 ? a : b;
            }

            function applyLimits() {
              const today = todayStr();
              const sv = start.value;
              const ev = end.value;

              end.max = today;
              if (sv) {
                end.min = sv;
              } else {
                end.removeAttribute("min");
              }

              start.max = ev ? minYmd(today, ev) : today;
            }

            function clampStart() {
              const today = todayStr();
              let sv = start.value;
              let ev = end.value;
              if (sv && compare(sv, today) > 0) {
                sv = today;
                start.value = sv;
              }
              if (sv && ev && compare(sv, ev) > 0) {
                end.value = sv;
              }
              applyLimits();
            }

            function clampEnd() {
              const today = todayStr();
              let sv = start.value;
              let ev = end.value;
              if (ev && compare(ev, today) > 0) {
                end.value = today;
                ev = today;
              }
              if (sv && ev && compare(ev, sv) < 0) {
                start.value = ev;
              }
              applyLimits();
            }

            clampStart();
            clampEnd();
            applyLimits();

            start.addEventListener("change", clampStart);
            start.addEventListener("input", clampStart);
            end.addEventListener("change", clampEnd);
            end.addEventListener("input", clampEnd);

            form.addEventListener("submit", function (e) {
              clampStart();
              clampEnd();
              const today = todayStr();
              const sv = start.value;
              const ev = end.value;
              if (sv && compare(sv, today) > 0) {
                e.preventDefault();
                alert("시작일은 오늘 이후로 지정할 수 없습니다.");
                return;
              }
              if (ev && compare(ev, today) > 0) {
                e.preventDefault();
                alert("종료일은 오늘 이후로 지정할 수 없습니다.");
                return;
              }
              if (sv && ev && compare(sv, ev) > 0) {
                e.preventDefault();
                alert("시작일은 종료일보다 늦을 수 없습니다.");
                return;
              }
            });
          })();

          function formatDate(value) {
            if (!value) return "";
            const d = new Date(value);
            if (isNaN(d.getTime())) return value;
            const pad = (n) => String(n).padStart(2, "0");
            return (
              d.getFullYear() +
              "-" +
              pad(d.getMonth() + 1) +
              "-" +
              pad(d.getDate())
            );
          }

          /**
           * API 연동 전 프론트 전용. false 로 바꾸면 제거 실패(7-2) 알림만 재현할 수 있습니다.
           */
          const REMOVAL_SIMULATE_SUCCESS = true;

          let gridData = Array.isArray(projectRoleRows)
            ? projectRoleRows.map(function (r) {
                return typeof r === "object" && r !== null
                  ? Object.assign({}, r)
                  : r;
              })
            : [];
          let deleteMode = false;
          let grid = null;
          /** 그리드 destroy 시 같이 지워지지 않도록 보관하는 툴바 루트 */
          let toolbarMountElement = null;

          function getToolbarMount() {
            if (!toolbarMountElement) {
              toolbarMountElement = document.createElement("div");
              toolbarMountElement.id = "roleGridToolbarMount";
              toolbarMountElement.className = "role-grid-toolbar";
              toolbarMountElement.setAttribute("role", "toolbar");
              toolbarMountElement.setAttribute("aria-label", "역할 목록 도구");
            }
            return toolbarMountElement;
          }

          function detachToolbarFromGrid() {
            const host = document.getElementById("menuRoleGrid");
            const mount = getToolbarMount();
            if (host && mount.parentNode === host) {
              host.removeChild(mount);
            }
          }

          function placeToolbarBetweenTableAndPagination() {
            const host = document.getElementById("menuRoleGrid");
            const mount = getToolbarMount();
            if (!host || !mount) return false;
            const pag = host.querySelector(".tui-pagination");
            if (pag && pag.parentNode) {
              pag.parentNode.insertBefore(mount, pag);
              return true;
            }
            return false;
          }

          function schedulePlaceToolbar() {
            var tries = 0;
            function attempt() {
              if (placeToolbarBetweenTableAndPagination()) return;
              tries += 1;
              if (tries < 15) {
                setTimeout(attempt, 30);
                return;
              }
              var host = document.getElementById("menuRoleGrid");
              var mount = getToolbarMount();
              if (host && mount && !host.contains(mount)) {
                host.appendChild(mount);
              }
            }
            setTimeout(attempt, 0);
          }

          function rowBizId(r) {
            if (!r) return null;
            if (r.roleCd != null && r.roleCd !== "") return String(r.roleCd);
            if (r.id != null && r.id !== "") return String(r.id);
            return null;
          }

          function getCheckedRowsForRemove() {
            if (!grid) return [];
            if (typeof grid.getCheckedRowKeys === "function") {
              const keys = grid.getCheckedRowKeys();
              if (
                Array.isArray(keys) &&
                keys.length &&
                typeof grid.getRow === "function"
              ) {
                return keys.map((k) => grid.getRow(k)).filter(Boolean);
              }
            }
            if (typeof grid.getCheckedRows === "function") {
              const arr = grid.getCheckedRows();
              if (Array.isArray(arr)) return arr;
            }
            return [];
          }

          function renderToolbar() {
            const mount = getToolbarMount();
            if (!mount) return;
            let html =
              '<button type="button" class="role-grid-toolbar__btn role-grid-toolbar__btn--register" id="roleBtnRegister">등록</button>';
            if (!deleteMode) {
              html +=
                '<button type="button" class="role-grid-toolbar__btn role-grid-toolbar__btn--delete" id="roleBtnDelete">삭제</button>';
            } else {
              const rows = grid ? getCheckedRowsForRemove() : [];
              const n = rows.length;
              if (n === 0) {
                html +=
                  '<button type="button" class="role-grid-toolbar__btn role-grid-toolbar__btn--cancel-delete" id="roleBtnDeleteCancel">삭제 취소</button>';
              } else {
                html +=
                  '<button type="button" class="role-grid-toolbar__btn role-grid-toolbar__btn--remove" id="roleBtnRemove">제거</button>';
              }
            }
            mount.innerHTML = html;
          }

          function bindToolbarMountOnce() {
            const mount = getToolbarMount();
            if (mount.dataset.bound === "1") return;
            mount.dataset.bound = "1";
            mount.addEventListener("click", function (e) {
              const btn = e.target.closest("button");
              if (!btn || !btn.id) return;
              if (btn.id === "roleBtnRegister") {
                return;
              }
              if (btn.id === "roleBtnDelete") {
                deleteMode = true;
                recreateGrid();
                return;
              }
              if (btn.id === "roleBtnDeleteCancel") {
                deleteMode = false;
                recreateGrid();
                return;
              }
              if (btn.id === "roleBtnRemove") {
                onRemoveClicked();
              }
            });
          }

          function onRemoveClicked() {
            const rows = getCheckedRowsForRemove();
            if (!rows.length) {
              return;
            }
            const names = rows.map(function (r) {
              return r.roleName != null && r.roleName !== ""
                ? String(r.roleName)
                : "(역할명 없음)";
            });
            const msg =
              "선택한 역할을 삭제하시겠습니까?\n\n" + names.join("\n");
            if (!window.confirm(msg)) {
              return;
            }
            const removalSucceeded = REMOVAL_SIMULATE_SUCCESS;
            const labelPart =
              names.length === 1
                ? "「" + names[0] + "」"
                : "「" + names.join("」, 「") + "」";
            if (!removalSucceeded) {
              window.alert(labelPart + " 제거 중 오류가 발생하였습니다.");
              return;
            }
            const okMsg =
              names.length === 1
                ? labelPart + "이(가) 정상적으로 제거되었습니다."
                : labelPart + " 역할이 정상적으로 제거되었습니다.";
            window.alert(okMsg);

            const removeSet = {};
            rows.forEach(function (r) {
              const id = rowBizId(r);
              if (id) removeSet[id] = true;
            });
            gridData = gridData.filter(function (r) {
              const id = rowBizId(r);
              return !id || !removeSet[id];
            });
            deleteMode = false;
            recreateGrid();
          }

          function recreateGrid() {
            detachToolbarFromGrid();
            if (grid) {
              grid.destroy();
              grid = null;
            }
            const el = document.getElementById("menuRoleGrid");
            if (!el) return;

            bindToolbarMountOnce();

            const rowHeaders = deleteMode
              ? [{ type: "checkbox", header: "선택" }]
              : [{ type: "rowNum", header: "번호" }];

            grid = new tui.Grid({
              el: el,
              data: gridData,
              rowHeaders: rowHeaders,
              scrollX: false,
              scrollY: false,
              bodyHeight: "auto",
              rowHeight: 36,
              minBodyHeight: 100,
              columns: [
                {
                  header: "ROLE_CD",
                  name: "roleCd",
                  width: 110,
                  align: "center",
                  sortable: true,
                  formatter: ({ value }) =>
                    value == null || value === "" ? "" : String(value),
                },
                {
                  header: "역할명",
                  name: "roleName",
                  width: 220,
                  align: "center",
                  sortable: true,
                  formatter: ({ row, value }) => {
                    const rc =
                      row.roleCd != null && row.roleCd !== ""
                        ? row.roleCd
                        : row.id;
                    const text = value == null ? "" : value;
                    const q =
                      "prjId=" +
                      encodeURIComponent(prjId) +
                      "&roleCd=" +
                      encodeURIComponent(rc == null ? "" : String(rc));
                    return (
                      '<a href="/project/option/role/roleManagementInfo?' +
                      q +
                      '">' +
                      text +
                      "</a>"
                    );
                  },
                },
                {
                  header: "보유 그룹 수",
                  name: "grpCnt",
                  width: 120,
                  align: "center",
                  sortable: true,
                },
                {
                  header: "권한 생성일",
                  name: "createdOn",
                  width: 120,
                  align: "center",
                  sortable: true,
                  formatter: ({ value }) => formatDate(value),
                },
              ],
              pageOptions: {
                useClient: true,
                perPage: 15,
              },
            });

            grid.on("check", function () {
              renderToolbar();
            });
            grid.on("uncheck", function () {
              renderToolbar();
            });
            grid.on("checkAll", function () {
              renderToolbar();
            });
            grid.on("uncheckAll", function () {
              renderToolbar();
            });

            grid.on("click", function (ev) {
              if (deleteMode) {
                return;
              }
              if (ev.columnName === "roleName" || ev.rowKey == null) return;
              const row = grid.getRow(ev.rowKey);
              const rc =
                row && row.roleCd != null && row.roleCd !== ""
                  ? row.roleCd
                  : row && row.id;
              if (rc != null && rc !== "") {
                location.href =
                  "/project/option/role/roleManagementInfo?prjId=" +
                  encodeURIComponent(prjId) +
                  "&roleCd=" +
                  encodeURIComponent(String(rc));
              }
            });

            renderToolbar();
            schedulePlaceToolbar();
          }

          recreateGrid();
        });
      </script>
    </div>
  </body>
</html>
