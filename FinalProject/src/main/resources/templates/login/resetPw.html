<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org">

<div th:fragment="resetPwModal">
	<div class="modal fade" id="resetPwModal" tabindex="-1">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">비밀번호 재설정</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal">
					</button>
				</div>
				<div class="modal-body">

					<!-- 기업번호 -->
					<div class="mb-3">
						<label class="form-label"> 기업번호 </label> <input type="text"
							id="bizNo" class="form-control"> <small
							class="text-danger d-none" id="bizNoError"> 기업번호를 입력하세요.
						</small>
					</div>

					<!-- 아이디 -->
					<div class="mb-3">
						<label class="form-label"> 아이디 </label> <input type="text"
							id="loginId" class="form-control">
					</div>

					<!-- 이메일 -->
					<div class="mb-3">
						<label class="form-label"> 이메일 </label>
						<div class="d-flex gap-2">
							<input type="email" id="email" class="form-control">
							<button type="button" class="btn btn-primary" id="sendCodeBtn">
								인증요청</button>
						</div>
						<small class="text-danger d-none" id="emailError"> 이메일 정보가
							올바르지 않습니다. </small>
					</div>

					<!-- 인증번호 영역 -->
					<div class="mb-3 d-none" id="verifyArea">
						<label class="form-label"> 인증번호 </label>
						<div class="d-flex gap-2">
							<input type="text" id="verifyCode" class="form-control">
							<button type="button" class="btn btn-success">인증</button>
						</div>
						<small class="text-danger d-none" id="verifyError"> 재인증이
							필요합니다. </small>
					</div>

					<!-- 비밀번호 변경 -->
					<div class="d-none" id="passwordArea">
						<div class="mb-3">
							<label class="form-label"> 새 비밀번호 </label> <input type="password"
								class="form-control">
						</div>
						<div class="mb-3">
							<label class="form-label"> 비밀번호 확인 </label> <input
								type="password" class="form-control"> <small
								class="text-danger d-none"> 비밀번호가 일치하지 않습니다. </small>
						</div>
					</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-secondary"
						data-bs-dismiss="modal">닫기</button>
					<button type="button" class="btn btn-primary d-none"
						id="confirmBtn">확인</button>
				</div>
			</div>
		</div>
	</div>
</div>

</html>
