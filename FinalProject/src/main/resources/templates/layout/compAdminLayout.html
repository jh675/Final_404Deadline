<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>layout</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<link rel="stylesheet"
	href="https://uicdn.toast.com/tui.grid/latest/tui-grid.css" />
<link rel="stylesheet"
	href="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.css" />
</head>
<body>
	<div class="container">
		<nav class="navbar navbar-expand-lg bg-body-tertiary">
			<div class="container-fluid">
				<a class="navbar-brand">기업 관리자</a>
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#navbarNav"
					aria-controls="navbarNav" aria-expanded="false"
					aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item"><a class="nav-link active"
							aria-current="page" th:href="@{/}">메뉴1</a></li>
						<li class="nav-item"><a class="nav-link" th:href="@{/}">메뉴2</a>
						</li>
						<!--/* <li class="nav-item"><a class="nav-link" href="#">Pricing</a>
						</li>
						<li class="nav-item"><a class="nav-link disabled"
							aria-disabled="true">Disabled</a></li> */-->
					</ul>
					<div class="d-flex align-items-center gap-2"
						sec:authorize="isAuthenticated()">

						<span> <strong sec:authentication="principal.name"></strong>
							님
						</span>

						<form th:action="@{/logout}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}"
								th:value="${_csrf.token}">

							<button type="submit" class="btn btn-outline-danger btn-sm">
								로그아웃</button>
						</form>
					</div>
				</div>
			</div>
		</nav>

		<div class="card">
			<div class="card-body">
				<div layout:fragment="content">This is some text within a card
					body.</div>
			</div>
		</div>

		<div th:insert="~{layout/footer::yedam}"></div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
		
	</script>
	<script src="https://uicdn.toast.com/tui.grid/latest/tui-grid.js"></script>
	<script
		src="https://uicdn.toast.com/tui.pagination/latest/tui-pagination.js"></script>
</body>
</html>
